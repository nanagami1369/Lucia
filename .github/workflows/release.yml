name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Lucia.Installer
        run: |
          dotnet publish src/Lucia.Installer/Lucia.Installer.csproj `
            --configuration Release `
            --output ./publish/Lucia.Installer

      - name: Compute SHA256
        id: hash
        shell: pwsh
        run: |
          $exePath = "publish/Lucia.Installer/Lucia.Installer.exe"
          $hash = (Get-FileHash -Algorithm SHA256 $exePath).Hash.ToLower()
          Write-Output "sha256=$hash" >> $env:GITHUB_OUTPUT

          # ハッシュファイルも生成（検証用）
          "$hash  Lucia.Installer.exe" | Set-Content "publish/Lucia.Installer/Lucia.Installer.exe.sha256"
          Write-Host "SHA256: $hash"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/Lucia.Installer/Lucia.Installer.exe
            publish/Lucia.Installer/Lucia.Installer.exe.sha256
          append_body: true
          body: |
            インストール方法は [ユーザーガイド](https://github.com/nanagami1369/Lucia/blob/main/docs/USER_GUIDE.md) を参照してください。
