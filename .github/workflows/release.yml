name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build MSI Installer
        run: |
          dotnet build src/Lucia.WixInstaller/Lucia.WixInstaller.wixproj `
            --configuration Release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            src/Lucia.WixInstaller/bin/x64/Release/ja-JP/Lucia.msi
          append_body: true
          body: |
            インストール方法は [ユーザーガイド](https://github.com/nanagami1369/Lucia/blob/main/docs/USER_GUIDE.md) を参照してください。
